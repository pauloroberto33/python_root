<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Pilates Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-2X+AiXZ68+ZbQn5dB7ztnr2wkbHJ2yr0rJKn9G1Q4C7ww0s8r8FuY7oAN7XyXebH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-body">
    <header class="site-header mb-4">
        <nav class="navbar navbar-expand-lg navbar-theme navbar-dark sticky-top shadow-lg">
            <div class="container-xl">
                <a class="navbar-brand fw-bold" href="/">Pilates <span class="text-primary">Studio</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center">
                        <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
                        <li class="nav-item"><a class="nav-link" href="/clientes">Clientes</a></li>
                        <li class="nav-item"><a class="nav-link" href="/avaliacoes">Avaliações</a></li>
                        <li class="nav-item"><a class="nav-link" href="/pagamentos">Pagamentos</a></li>
                        <li class="nav-item"><a class="nav-link" href="/despesas">Despesas</a></li>
                        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container-xl pb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer py-5">
        <div class="container-xl text-center text-muted small">
            <p class="mb-1">Sistema Pilates Studio 2026</p>
            <p class="mb-0">Gestão moderna para clientes, avaliações, finanças e desempenho</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-QJHtvGhmr9bDao/K7EjYu6k0bNSKFb1Aw9ssiFl6xwV5ZEe5d5kT5p3Iie3INhJ0" crossorigin="anonymous"></script>
</body>
</html>
