<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Turbine Performance Calc</title>
</head>
<body class="bg-gray-900 text-white p-10">
    <div class="max-w-xl mx-auto bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-mono mb-6 text-blue-400"># Turbine_Analyzer_v1.0</h1>
        
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label class="block text-xs uppercase text-gray-400">P. Entrada (bar)</label>
                <input type="number" id="p_entrada" class="w-full bg-gray-700 border-none rounded p-2 mt-1">
            </div>
            <div>
                <label class="block text-xs uppercase text-gray-400">T. Entrada (°C)</label>
                <input type="number" id="t_entrada" class="w-full bg-gray-700 border-none rounded p-2 mt-1">
            </div>
            <div>
                <label class="block text-xs uppercase text-gray-400">Vazão (kg/h)</label>
                <input type="number" id="vazao" class="w-full bg-gray-700 border-none rounded p-2 mt-1">
            </div>
            <div>
                <label class="block text-xs uppercase text-gray-400">P. Escape (bar)</label>
                <input type="number" id="p_escape" class="w-full bg-gray-700 border-none rounded p-2 mt-1">
            </div>
            <div>
                <label class="block text-xs uppercase text-gray-400">P. Extração (bar) - Opcional</label>
                <input type="number" id="p_extracao" class="w-full bg-gray-700 border-none rounded p-2 mt-1" placeholder="Deixe vazio se não houver">
            </div>
            <div>
                <label class="block text-xs uppercase text-gray-400">Vazão Extração (kg/h) - Opcional</label>
                <input type="number" id="vazao_extracao" class="w-full bg-gray-700 border-none rounded p-2 mt-1" placeholder="0 se não houver">
            </div>
        </div>

        <div class="mt-4">
            <label class="block text-xs uppercase text-gray-400">Eficiência Isentrópica (%)</label>
            <input type="range" id="eficiencia" min="50" max="95" value="85" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
            <span id="ef_val" class="text-blue-400 text-sm">85%</span>
        </div>

        <button onclick="calcular()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition">
            SIMULAR PERFORMANCE
        </button>

        <div id="res" class="mt-8 hidden border-t border-gray-600 pt-6">
            <p class="text-gray-400">Potência Gerada:</p>
            <h2 class="text-4xl font-bold text-green-400"><span id="pot">0</span> MW</h2>
        </div>
    </div>

    <script>
        document.getElementById('eficiencia').oninput = function() {
            document.getElementById('ef_val').innerText = this.value + '%';
        }

        async function calcular() {
            let p_extr = parseFloat(document.getElementById('p_extracao').value);
            let v_extr = parseFloat(document.getElementById('vazao_extracao').value);
            const payload = {
                p_entrada: parseFloat(document.getElementById('p_entrada').value),
                t_entrada: parseFloat(document.getElementById('t_entrada').value),
                vazao: parseFloat(document.getElementById('vazao').value),
                p_escape: parseFloat(document.getElementById('p_escape').value),
                eficiencia: parseFloat(document.getElementById('eficiencia').value),
                p_extracao: isNaN(p_extr) ? null : p_extr,
                vazao_extracao: isNaN(v_extr) ? null : v_extr
            };

            const resp = await fetch('/api/calcular', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await resp.json();
            document.getElementById('pot').innerText = data.potencia_estimada_MW;
            document.getElementById('res').classList.remove('hidden');
        }
    </script>
</body>
</html>
