<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fintech AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-2xl mx-auto py-12">
        <h1 class="text-3xl font-bold text-blue-900 mb-8">Análise de Crédito IA</h1>
        
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Renda Mensal (R$)</label>
                    <input type="number" id="renda" class="mt-1 block w-full border border-slate-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Dívida Total (R$)</label>
                    <input type="number" id="divida" class="mt-1 block w-full border border-slate-300 rounded-md p-2">
                </div>
                <button onclick="enviarDados()" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition">
                    Calcular Score com IA
                </button>
            </div>

            <div id="resultado" class="mt-8 hidden p-4 rounded-lg bg-blue-50 border border-blue-100">
                <p class="text-blue-900 font-bold text-xl">Score: <span id="scoreVal">0</span></p>
                <p class="text-blue-700">Status: <span id="statusVal">-</span></p>
            </div>
        </div>
    </div>

    <script>
        let respostaAnalise = null;

        async function enviarDados() {
            const renda = document.getElementById('renda').value;
            const divida = document.getElementById('divida').value;

            const response = await fetch('/api/analisar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ renda: parseFloat(renda), divida: parseFloat(divida) })
            });
            
            respostaAnalise = await response.json();
            document.getElementById('scoreVal').innerText = respostaAnalise.score;
            document.getElementById('statusVal').innerText = respostaAnalise.recomendacao;
            document.getElementById('resultado').classList.remove('hidden');
        }
    </script>
</body>
</html>
